name: Publish NuGet
on:
  release:
    types: [published]
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Pack Core
        run: dotnet pack dotnet/PullSub.Core/PullSub.Core.csproj -c Release -o artifacts

      - name: Pack Mqtt
        run: dotnet pack dotnet/PullSub.Mqtt/PullSub.Mqtt.csproj -c Release -o artifacts

      - name: Push to NuGet
        run: |
          dotnet nuget push artifacts/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate